name: 'AIQualityHQ Prompt Check'
description: 'Analyze a prompt using the AIQualityHQ API and gate CI on the score'
branding:
  icon: 'check-circle'
  color: 'blue'

inputs:
  api-url:
    description: 'AIQualityHQ API URL'
    required: false
    default: 'https://aiqualityhq.com/api/check'
  api-key:
    description: 'API key (omit for public rate-limited access)'
    required: false
  prompt:
    description: 'Prompt text to analyze'
    required: false
  prompt-file:
    description: 'Path to a file containing the prompt'
    required: false
  score-threshold:
    description: 'Minimum overall score to pass (0–100)'
    required: false
    default: '60'
  comment-on-pr:
    description: 'Post a PR comment with results (true/false)'
    required: false
    default: 'false'
  github-token:
    description: 'GitHub token for PR comments'
    required: false

outputs:
  score:
    description: 'Overall score (0–100)'
  passed:
    description: 'Whether the check passed'
  json:
    description: 'Full analysis JSON (stringified)'

runs:
  using: 'composite'
  steps:
    - name: Read prompt
      id: read
      shell: bash
      run: |
        if [[ -n "${{ inputs.prompt }}" ]]; then
          echo "prompt<<EOF" >> $GITHUB_OUTPUT
          echo "${{ inputs.prompt }}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        elif [[ -n "${{ inputs.prompt-file }}" ]]; then
          echo "prompt<<EOF" >> $GITHUB_OUTPUT
          cat "${{ inputs.prompt-file }}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        else
          echo "error=No prompt or prompt-file provided" >> $GITHUB_OUTPUT
          exit 1
        fi

    - name: Call API
      id: api
      shell: bash
      run: |
        PAYLOAD=$(jq -n --arg p "${{ steps.read.outputs.prompt }}" '{prompt: $p}')
        HEADERS="-H 'Content-Type: application/json'"
        if [[ -n "${{ inputs.api-key }}" ]]; then
          HEADERS="$HEADERS -H 'X-API-Key: ${{ inputs.api-key }}'"
        fi
        RESPONSE=$(curl -s -w '\n%{http_code}' $HEADERS -d "$PAYLOAD" "${{ inputs.api-url }}")
        HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
        BODY=$(echo "$RESPONSE" | sed '$d')
        if [[ "$HTTP_CODE" != "200" ]]; then
          echo "error=API returned HTTP $HTTP_CODE: $BODY" >> $GITHUB_OUTPUT
          exit 1
        fi
        echo "result<<EOF" >> $GITHUB_OUTPUT
        echo "$BODY" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
        SCORE=$(echo "$BODY" | jq -r '.overallScore')
        PASSED=$(echo "$BODY" | jq -r '.passed')
        echo "score=$SCORE" >> $GITHUB_OUTPUT
        echo "passed=$PASSED" >> $GITHUB_OUTPUT

    - name: Check threshold
      id: check
      shell: bash
      run: |
        SCORE=${{ steps.api.outputs.score }}
        THRESHOLD=${{ inputs.score-threshold }}
        if [[ -z "$SCORE" || "$SCORE" == "null" ]]; then
          echo "error=Failed to parse score" >> $GITHUB_OUTPUT
          exit 1
        fi
        echo "score=$SCORE" >> $GITHUB_OUTPUT
        echo "Score: $SCORE / 100 (threshold: $THRESHOLD)"
        if (( $(echo "$SCORE >= $THRESHOLD" | bc -l) )); then
          echo "passed=true" >> $GITHUB_OUTPUT
          echo "Prompt quality check PASSED."
        else
          echo "passed=false" >> $GITHUB_OUTPUT
          echo "Prompt quality check FAILED (score $SCORE < $THRESHOLD)."
          exit 1
        fi

    - name: Post PR comment
      if: inputs.comment-on-pr == 'true' && github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        github-token: ${{ inputs.github-token || github.token }}
        script: |
          const result = ${{ steps.api.outputs.result }};
          const lines = [
            `### 🤖 AIQualityHQ Prompt Check`,
            ``,
            `**Overall Score:** ${result.overallScore}/100 (${result.passed ? '✅ Pass' : '❌ Fail'})`,
            ``,
            result.dimensions ? Object.values(result.dimensions).map(d =>
              `- **${d.name}:** ${d.score}/100 (${d.passedCount}/${d.factorsCount} rules passed)`
            ).join('\n') : '',
            ``,
            result.recommendations?.length ? `**Recommendations:**\n${result.recommendations.slice(0, 5).map(r => `- ${r}`).join('\n')}` : '',
          ].filter(Boolean).join('\n');
          await github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: lines,
          });
