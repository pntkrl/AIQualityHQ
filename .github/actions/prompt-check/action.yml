name: 'AIQualityHQ Prompt Check'
description: 'Analyze a prompt using the AIQualityHQ API and gate CI on the score'
branding:
  icon: 'check-circle'
  color: 'blue'

inputs:
  api-url:
    description: 'AIQualityHQ API URL'
    required: false
    default: 'https://aiqualityhq.com/api/check'
  api-key:
    description: 'API key (omit for public rate-limited access)'
    required: false
  prompt:
    description: 'Prompt text to analyze'
    required: false
  prompt-file:
    description: 'Path to a file containing the prompt'
    required: false
  score-threshold:
    description: 'Minimum overall score to pass (0–100)'
    required: false
    default: '60'
  baseline-score:
    description: 'Previous version score to detect regression (score must not drop below this)'
    required: false
  regression-threshold:
    description: 'Max allowed score drop vs baseline before failing (e.g. 5 = fail if score drops >=5 pts)'
    required: false
    default: '0'
  comment-on-pr:
    description: 'Post a PR comment with results (true/false)'
    required: false
    default: 'false'
  github-token:
    description: 'GitHub token for PR comments'
    required: false

outputs:
  score:
    description: 'Overall score (0–100)'
  passed:
    description: 'Whether the check passed'
  json:
    description: 'Full analysis JSON (stringified)'
  regression:
    description: 'true if score regressed vs baseline'
  regression-delta:
    description: 'Score change vs baseline (negative = regression)'

runs:
  using: 'composite'
  steps:
    - name: Read prompt
      id: read
      shell: bash
      run: |
        if [[ -n "${{ inputs.prompt }}" ]]; then
          echo "prompt<<EOF" >> $GITHUB_OUTPUT
          echo "${{ inputs.prompt }}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        elif [[ -n "${{ inputs.prompt-file }}" ]]; then
          echo "prompt<<EOF" >> $GITHUB_OUTPUT
          cat "${{ inputs.prompt-file }}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        else
          echo "error=No prompt or prompt-file provided" >> $GITHUB_OUTPUT
          exit 1
        fi

    - name: Call API
      id: api
      shell: bash
      run: |
        PAYLOAD=$(jq -n --arg p "${{ steps.read.outputs.prompt }}" '{prompt: $p}')
        HEADERS="-H 'Content-Type: application/json'"
        if [[ -n "${{ inputs.api-key }}" ]]; then
          HEADERS="$HEADERS -H 'X-API-Key: ${{ inputs.api-key }}'"
        fi
        RESPONSE=$(curl -s -w '\n%{http_code}' $HEADERS -d "$PAYLOAD" "${{ inputs.api-url }}")
        HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
        BODY=$(echo "$RESPONSE" | sed '$d')
        if [[ "$HTTP_CODE" != "200" ]]; then
          echo "error=API returned HTTP $HTTP_CODE: $BODY" >> $GITHUB_OUTPUT
          exit 1
        fi
        echo "result<<EOF" >> $GITHUB_OUTPUT
        echo "$BODY" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
        SCORE=$(echo "$BODY" | jq -r '.overallScore')
        PASSED=$(echo "$BODY" | jq -r '.passed')
        echo "score=$SCORE" >> $GITHUB_OUTPUT
        echo "passed=$PASSED" >> $GITHUB_OUTPUT

    - name: Check threshold & regression
      id: check
      shell: bash
      run: |
        SCORE=${{ steps.api.outputs.score }}
        THRESHOLD=${{ inputs.score-threshold }}
        if [[ -z "$SCORE" || "$SCORE" == "null" ]]; then
          echo "error=Failed to parse score" >> $GITHUB_OUTPUT
          exit 1
        fi
        echo "score=$SCORE" >> $GITHUB_OUTPUT
        echo "Score: $SCORE / 100 (threshold: $THRESHOLD)"

        # Absolute threshold check
        if (( $(echo "$SCORE >= $THRESHOLD" | bc -l) )); then
          echo "passed=true" >> $GITHUB_OUTPUT
          PASSED=true
          echo "Absolute threshold: PASSED ($SCORE >= $THRESHOLD)."
        else
          echo "passed=false" >> $GITHUB_OUTPUT
          PASSED=false
          echo "Absolute threshold: FAILED ($SCORE < $THRESHOLD)."
        fi

        # Regression vs baseline
        REGRESSION=false
        DELTA=0
        if [[ -n "${{ inputs.baseline-score }}" ]]; then
          BASELINE=${{ inputs.baseline-score }}
          REGRESSION_THRESHOLD=${{ inputs.regression-threshold }}
          DELTA=$(echo "$SCORE - $BASELINE" | bc -l)
          echo "regression-delta=$DELTA" >> $GITHUB_OUTPUT
          if (( $(echo "$DELTA < -$REGRESSION_THRESHOLD" | bc -l) )); then
            REGRESSION=true
            echo "REGRESSION DETECTED: score dropped from $BASELINE to $SCORE (delta: $DELTA, threshold: ±$REGRESSION_THRESHOLD)."
          fi
          echo "regression=$REGRESSION" >> $GITHUB_OUTPUT
        fi

        # Final result
        if [[ "$PASSED" == "true" && "$REGRESSION" == "false" ]]; then
          echo "Prompt quality check PASSED."
        else
          if [[ "$PASSED" == "false" ]]; then
            echo "Prompt quality check FAILED (score $SCORE < $THRESHOLD)."
          fi
          if [[ "$REGRESSION" == "true" ]]; then
            echo "Prompt quality check FAILED (regression: $DELTA pts vs baseline)."
          fi
          exit 1
        fi

    - name: Post PR comment
      if: inputs.comment-on-pr == 'true' && github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        github-token: ${{ inputs.github-token || github.token }}
        script: |
          const result = ${{ steps.api.outputs.result }};
          const regressionInfo = '${{ steps.check.outputs.regression }}' === 'true'
            ? `\n\n⚠️ **Regression detected:** score dropped ${{ steps.check.outputs['regression-delta'] }} pts vs baseline.`
            : '';
          const lines = [
            `### 🤖 AIQualityHQ Prompt Check`,
            ``,
            `**Overall Score:** ${result.overallScore}/100 (${result.passed ? '✅ Pass' : '❌ Fail'})`,
            regressionInfo,
            ``,
            result.dimensions ? Object.values(result.dimensions).map(d =>
              `- **${d.name}:** ${d.score}/100 (${d.passedCount}/${d.factorsCount} rules passed)`
            ).join('\n') : '',
            ``,
            result.recommendations?.length ? `**Recommendations:**\n${result.recommendations.slice(0, 5).map(r => `- ${r}`).join('\n')}` : '',
          ].filter(Boolean).join('\n');
          await github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: lines,
          });
